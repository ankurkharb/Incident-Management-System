# ─── Render.com Blueprint ───────────────────────────────────────────────
# Deploy with: Render Dashboard → New → Blueprint → Connect this repo
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────
  - type: web
    name: ims-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_DSN
        value: "postgresql://neondb_owner:npg_iK7mcJRt6INM@ep-young-bird-apciatap-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require"
      - key: MONGO_URI
        sync: false  # Set manually in dashboard (MongoDB Atlas)
      - key: MONGO_DB_NAME
        value: ims
      - key: REDIS_URL
        fromService:
          name: ims-redis
          type: redis
          property: connectionString
      - key: PYTHONPATH
        value: /opt/render/project/src

  # ── React Frontend (Static Site) ──────────────────────────────────────
  - type: web
    name: ims-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ims-backend.onrender.com/api/*
      - type: rewrite
        source: /health
        destination: https://ims-backend.onrender.com/health
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Redis ──────────────────────────────────────────────────────────────
  - type: redis
    name: ims-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
